<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌍 Fruity World — Earth's Tastiest Treasures</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0b1f16;
  --bg2: #112b1e;
  --land: #1e4d33;
  --land-data: #2a6643;
  --land-hover: #3d8f5a;
  --land-selected: #f4b942;
  --ocean: #071e30;
  --border: #163826;
  --panel: #0d2419;
  --gold: #f4b942;
  --coral: #ff7659;
  --mint: #5ddcb0;
  --text: #dff0e6;
  --muted: #6fa882;
  --card-bg: rgba(255,255,255,0.05);
  --card-hover: rgba(255,255,255,0.1);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif}

/* ── HEADER ── */
header{
  position:relative;z-index:20;
  background:linear-gradient(90deg,#071f12 0%,#0d2e1d 100%);
  border-bottom:2px solid rgba(244,185,66,0.25);
  padding:0 24px;
  height:56px;
  display:flex;align-items:center;gap:16px;
}
header h1{
  font-family:'Baloo 2',cursive;font-weight:800;font-size:1.7rem;
  color:var(--gold);letter-spacing:-0.5px;line-height:1;
  display:flex;align-items:center;gap:8px;
}
header .tagline{color:var(--muted);font-size:.8rem;font-weight:600}
.legend{
  margin-left:auto;display:flex;align-items:center;gap:16px;font-size:.75rem;color:var(--muted);
}
.legend span{display:flex;align-items:center;gap:5px}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dot.has{background:var(--land-data);box-shadow:0 0 6px rgba(90,200,130,.5)}
.dot.sel{background:var(--gold)}

/* ── LAYOUT ── */
#main{display:flex;width:100%;height:calc(100vh - 56px);overflow:hidden;position:relative}

/* ── MAP ── */
#map-wrap{flex:1;position:relative;overflow:hidden}
#world-map{width:100%;height:100%;display:block;cursor:crosshair}
.sphere{fill:var(--ocean)}
.graticule{fill:none;stroke:rgba(255,255,255,.04);stroke-width:.5}
.country{fill:var(--land);stroke:var(--border);stroke-width:.4px;transition:fill .18s;cursor:pointer}
.country.has-data{fill:var(--land-data);cursor:pointer}
.country.has-data:hover,.country:hover{fill:var(--land-hover)}
.country.selected{fill:var(--land-selected)!important}

/* Pulse markers */
.pulse-dot{cursor:pointer}
.pulse-circle{fill:var(--gold);opacity:.7;animation:pd 2.2s ease-in-out infinite}
.pulse-ring{fill:none;stroke:var(--gold);stroke-width:1;opacity:0;animation:pr 2.2s ease-in-out infinite}
@keyframes pd{0%,100%{r:3;opacity:.7}50%{r:4;opacity:1}}
@keyframes pr{0%{r:4;opacity:.5}100%{r:9;opacity:0}}

/* Tooltip */
#tip{
  position:fixed;pointer-events:none;z-index:200;
  background:rgba(10,30,20,.95);border:1px solid rgba(244,185,66,.4);
  border-radius:8px;padding:5px 12px;font-size:.78rem;font-weight:700;
  color:var(--gold);opacity:0;transition:opacity .1s;white-space:nowrap;
}

/* Hint bar */
#hint{
  position:absolute;bottom:18px;left:50%;transform:translateX(-50%);
  background:rgba(10,30,20,.88);border:1px solid rgba(244,185,66,.25);
  border-radius:100px;padding:7px 20px;font-size:.78rem;color:var(--muted);
  pointer-events:none;animation:fadein 1s ease 1.2s both;white-space:nowrap;
}
@keyframes fadein{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ── SIDE PANEL ── */
#panel{
  width:0;min-width:0;
  background:var(--panel);
  border-left:2px solid rgba(244,185,66,.18);
  display:flex;flex-direction:column;
  transition:width .45s cubic-bezier(.34,1.56,.64,1),min-width .45s cubic-bezier(.34,1.56,.64,1);
  overflow:hidden;z-index:10;
}
#panel.open{width:360px;min-width:360px}

.panel-top{
  padding:18px 18px 14px;
  background:linear-gradient(135deg,var(--bg2) 0%,rgba(42,102,67,.25) 100%);
  border-bottom:1px solid rgba(244,185,66,.15);
  position:relative;flex-shrink:0;
}
.cname{
  font-family:'Baloo 2',cursive;font-size:1.4rem;font-weight:800;
  color:var(--gold);display:flex;align-items:center;gap:8px;line-height:1.1;
}
.csub{color:var(--muted);font-size:.75rem;margin-top:3px}
.close{
  position:absolute;top:14px;right:14px;
  background:rgba(244,185,66,.15);border:1px solid rgba(244,185,66,.35);
  color:var(--gold);width:26px;height:26px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:.85rem;transition:all .2s;
}
.close:hover{background:var(--gold);color:var(--bg)}

/* Fruit grid */
.fgrid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
  padding:14px;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;
}
.fc{
  background:var(--card-bg);border:2px solid transparent;
  border-radius:14px;padding:10px 6px;text-align:center;
  cursor:pointer;transition:all .25s cubic-bezier(.34,1.56,.64,1);
}
.fc:hover{transform:translateY(-4px) scale(1.06);background:var(--card-hover);border-color:rgba(244,185,66,.35)}
.fc.sel{border-color:var(--gold);background:rgba(244,185,66,.12);transform:translateY(-4px) scale(1.06)}
.fe{font-size:1.9rem;display:block;margin-bottom:3px}
.fn{font-family:'Baloo 2',cursive;font-size:.67rem;font-weight:700;color:var(--text);line-height:1.2}

/* bounce stagger */
.fc:nth-child(1) .fe{animation:bounce 2.4s ease-in-out .0s infinite}
.fc:nth-child(2) .fe{animation:bounce 2.4s ease-in-out .35s infinite}
.fc:nth-child(3) .fe{animation:bounce 2.4s ease-in-out .7s infinite}
.fc:nth-child(4) .fe{animation:bounce 2.4s ease-in-out 1.05s infinite}
.fc:nth-child(5) .fe{animation:bounce 2.4s ease-in-out 1.4s infinite}
.fc:nth-child(6) .fe{animation:bounce 2.4s ease-in-out 1.75s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

/* Detail pane */
#detail{flex:1;overflow-y:auto;padding:14px}
#detail::-webkit-scrollbar{width:3px}
#detail::-webkit-scrollbar-thumb{background:rgba(244,185,66,.3);border-radius:2px}

.empty-state{
  height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;color:var(--muted);font-size:.82rem;text-align:center;padding:20px;
}
.empty-state .big{font-size:2.5rem;animation:spin 5s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.dname{
  font-family:'Baloo 2',cursive;font-size:1.5rem;font-weight:800;color:var(--gold);
  display:flex;align-items:center;gap:10px;margin-bottom:6px;
}
.ddesc{font-size:.82rem;color:var(--muted);line-height:1.65;margin-bottom:14px}

.fact-box{
  background:rgba(244,185,66,.09);border-left:3px solid var(--gold);
  border-radius:0 8px 8px 0;padding:10px 13px;
  font-size:.8rem;color:var(--text);line-height:1.55;margin-bottom:14px;
}
.fact-box b{color:var(--gold);font-family:'Baloo 2',cursive}

.sh3{
  font-family:'Baloo 2',cursive;font-size:.78rem;font-weight:700;
  color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin-bottom:9px;
}

.srow{display:flex;align-items:center;gap:9px;margin-bottom:7px}
.slabel{font-size:.73rem;color:var(--muted);width:78px;flex-shrink:0}
.strack{flex:1;background:rgba(255,255,255,.07);border-radius:100px;height:7px;overflow:hidden}
.sbar{height:100%;border-radius:100px;transition:width .7s cubic-bezier(.34,1.56,.64,1)}
.sval{font-size:.72rem;color:var(--text);font-weight:700;width:36px;text-align:right;flex-shrink:0}

.tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:13px}
.tag{
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.13);
  border-radius:100px;padding:3px 10px;font-size:.7rem;color:var(--muted);
}

/* Ambient floaters */
.floater{
  position:fixed;font-size:1.6rem;opacity:.05;pointer-events:none;z-index:0;
  animation:float var(--d,8s) ease-in-out var(--dl,0s) infinite;
}
@keyframes float{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-30px) rotate(15deg)}}
</style>
</head>

// ─── D3 MAP SETUP ───────────────────────────────────────────────────────────
const svg = d3.select("#world-map");
const wrap = document.getElementById("map-wrap");

function dims(){ return { w: wrap.clientWidth, h: wrap.clientHeight }; }

let projection, path, zoom, gCountries, gMarkers;

function buildMap(world) {
  svg.selectAll("*").remove();
  const { w, h } = dims();

  projection = d3.geoNaturalEarth1()
    .scale(w / 6.2)
    .translate([w / 2, h / 2]);

  path = d3.geoPath().projection(projection);
  zoom = d3.zoom().scaleExtent([1, 8]).on("zoom", zoomed);

  // Sphere (ocean)
  svg.append("g").attr("class","sphere-g").append("path")
    .datum({type:"Sphere"})
    .attr("class","sphere")
    .attr("d", path);

  // Graticule
  svg.append("g").attr("class","grat-g").append("path")
    .datum(d3.geoGraticule()())
    .attr("class","graticule")
    .attr("d", path);

  // Countries
  gCountries = svg.append("g").attr("class","countries-g");
  const countries = topojson.feature(world, world.objects.countries);
  gCountries.selectAll(".country")
    .data(countries.features)
    .join("path")
    .attr("class", d => {
      const id = +d.id;
      return "country" + (DATA[id] ? " has-data" : "");
    })
    .attr("d", path)
    .on("mouseover", mouseOver)
    .on("mousemove", mouseMove)
    .on("mouseout", mouseOut)
    .on("click", clickCountry);

  // Pulse markers
  gMarkers = svg.append("g").attr("class","markers-g");
  for (const [id, coords] of Object.entries(CENTROIDS)) {
    const [lon, lat] = coords;
    const [x, y] = projection([lon, lat]);
    const g = gMarkers.append("g")
      .attr("class","pulse-dot")
      .attr("transform", `translate(${x},${y})`)
      .style("cursor","pointer")
      .on("click", () => openCountry(+id));
    g.append("circle").attr("class","pulse-ring").attr("r",4);
    g.append("circle").attr("class","pulse-circle").attr("r",3)
      .style("animation-delay", Math.random()*2 + "s");
  }

  svg.call(zoom);
}

function zoomed(event) {
  gCountries.attr("transform", event.transform);
  gMarkers.attr("transform", event.transform);
  svg.select(".sphere-g path").attr("d", path);
  svg.select(".grat-g path").attr("d", path);
}

// ─── INTERACTIONS ───────────────────────────────────────────────────────────
const tip = document.getElementById("tip");
let currentCountry = null;

function mouseOver(event, d) {
  const id = +d.id;
  const name = DATA[id]?.name || "—";
  if (DATA[id]) {
    tip.style.opacity = "1";
    tip.textContent = `${DATA[id].flag} ${name}  ·  ${DATA[id].fruits.length} fruits`;
  } else {
    tip.style.opacity = "1";
    tip.textContent = name !== "—" ? name : "Unknown country";
    tip.style.color = "var(--muted)";
  }
  if (DATA[id]) tip.style.color = "var(--gold)";
}

function mouseMove(event) {
  tip.style.left = (event.clientX + 14) + "px";
  tip.style.top = (event.clientY - 28) + "px";
}

function mouseOut() {
  tip.style.opacity = "0";
  tip.style.color = "var(--gold)";
}

function clickCountry(event, d) {
  const id = +d.id;
  if (!DATA[id]) return;
  openCountry(id);
}

function openCountry(id) {
  const data = DATA[id];
  if (!data) return;
  if (currentCountry === id) return;
  currentCountry = id;

  // Deselect all, select clicked
  gCountries.selectAll(".country").classed("selected", false);
  gCountries.selectAll(".country").filter(dd => +dd.id === id).classed("selected", true);

  // Panel header
  document.getElementById("cname").textContent = data.flag + " " + data.name;
  document.getElementById("csub").textContent = `${data.fruits.length} native & beloved fruits`;

  // Fruit grid
  const grid = document.getElementById("fgrid");
  grid.innerHTML = "";
  data.fruits.forEach((f, i) => {
    const card = document.createElement("div");
    card.className = "fc";
    card.innerHTML = `<span class="fe">${f.emoji}</span><span class="fn">${f.name}</span>`;
    card.addEventListener("click", () => {
      grid.querySelectorAll(".fc").forEach(c => c.classList.remove("sel"));
      card.classList.add("sel");
      renderDetail(f);
    });
    grid.appendChild(card);
  });

  // Open panel
  const panel = document.getElementById("panel");
  panel.classList.add("open");

  // Clear detail, show first fruit
  document.getElementById("detail").innerHTML = `<div class="empty-state"><div class="big">🍉</div><div>Pick a fruit above<br>to see its secrets!</div></div>`;

  // Auto-select first
  setTimeout(() => {
    const first = grid.querySelector(".fc");
    if (first) first.click();
  }, 200);

  // Hide hint
  document.getElementById("hint").style.opacity = "0";
}

function renderDetail(f) {
  const d = document.getElementById("detail");
  const maxVitC = 5300; // Kakadu max
  const vitCPct = Math.min(100, (f.vitC / maxVitC) * 100 + 8);
  const calPct = Math.min(100, (f.cal / 250) * 100);

  d.innerHTML = `
    <div class="dname"><span>${f.emoji}</span>${f.name}</div>
    <p class="ddesc">${f.desc}</p>
    <div class="fact-box">${f.fact}</div>

    <div class="stats-section">
      <div class="sh3">Flavor Profile</div>
      ${statRow("Sweetness", f.sweet, getColor(f.sweet, "#f4c430","#c0392b","#5ddc88"), f.sweet+"%")}
      ${statRow("Acidity", f.acid, getColor(f.acid, "#5ddc80","#f4c430","#ff6b4a"), f.acid+"%")}
      ${statRow("Bitterness", f.bitter, "#aaa", f.bitter+"%")}
    </div>

    <div class="stats-section" style="margin-top:14px">
      <div class="sh3">Nutrition (per 100g)</div>
      ${statRow("Vitamin C", vitCPct, "#5ddcb0", f.vitC+"mg")}
      ${statRow("Calories", calPct, "#f4b942", f.cal+"kcal")}
      ${statRow("Water", f.water||75, "#6ab4f0", (f.water||75)+"%")}
    </div>

    <div style="margin-top:14px">
      <div class="sh3">Season & Tags</div>
      <div style="font-size:.78rem;color:var(--muted);margin-bottom:8px">🗓️ ${f.season}</div>
      <div class="tags">${f.tags.map(t=>`<span class="tag">${t}</span>`).join("")}</div>
    </div>
  `;

  // Animate bars
  setTimeout(() => {
    d.querySelectorAll(".sbar").forEach(bar => {
      const w = bar.dataset.width;
      bar.style.width = w + "%";
    });
  }, 50);
}

function statRow(label, pct, color, val) {
  return `
    <div class="srow">
      <span class="slabel">${label}</span>
      <div class="strack"><div class="sbar" data-width="${pct}" style="width:0%;background:${color}"></div></div>
      <span class="sval">${val}</span>
    </div>`;
}

function getColor(v, lo, mid, hi) {
  if (v < 40) return lo;
  if (v < 70) return mid;
  return hi;
}

// Close panel
document.getElementById("close-btn").addEventListener("click", () => {
  document.getElementById("panel").classList.remove("open");
  gCountries.selectAll(".country").classed("selected", false);
  currentCountry = null;
  setTimeout(()=>{ document.getElementById("hint").style.opacity="1"; }, 500);
});

// Resize
window.addEventListener("resize", () => { if (window._worldData) buildMap(window._worldData); });

// ─── LOAD MAP DATA ──────────────────────────────────────────────────────────
fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json")
  .then(r => r.json())
  .then(world => {
    window._worldData = world;
    buildMap(world);
  })
  .catch(err => {
    document.getElementById("map-wrap").innerHTML =
      `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);font-family:'Baloo 2',cursive;font-size:1.2rem;text-align:center;padding:40px">
        🌍<br><br>Unable to load the world map.<br><span style="font-size:.85rem;font-family:'Nunito',sans-serif">Check your internet connection and reload.<br><br><em>${err}</em></span>
      </div>`;
  });
</script>
</body>
