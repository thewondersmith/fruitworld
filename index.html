<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🍓 Fruity World Explorer!</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --sky:#b8f0ff;--sky2:#e8faff;
  --ocean:#5bb8e8;--ocean2:#3a9fd4;
  --land:#c8f0a0;--land2:#a8dc78;--land-data:#78cc48;--land-sel:#ff6eb4;
  --panel:#fff8fe;
  --pink:#ff6eb4;--purple:#c97ff5;--mint:#5de8b0;--gold:#ffcc44;--coral:#ff7a5a;--sky-btn:#5bc8f0;
  --text:#3a2050;--muted:#9080b0;
  --r:22px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:linear-gradient(160deg,#fce8ff 0%,#e8f8ff 50%,#fff0fa 100%);font-family:'Nunito',sans-serif;color:var(--text);user-select:none}

/* ══ HEADER ══ */
header{
  position:relative;z-index:30;
  background:linear-gradient(90deg,#ff9de2 0%,#ffb347 35%,#85e89d 65%,#87ceeb 100%);
  padding:0 16px;height:52px;
  display:flex;align-items:center;gap:10px;
  box-shadow:0 3px 12px rgba(0,0,0,.15);
}
header h1{
  font-family:'Fredoka One',cursive;font-size:1.55rem;color:#fff;
  text-shadow:0 2px 0 rgba(0,0,0,.18);letter-spacing:.5px;line-height:1;
  display:flex;align-items:center;gap:7px;
}
.htag{
  margin-left:auto;background:rgba(255,255,255,.35);border-radius:100px;
  padding:4px 12px;font-size:.72rem;font-weight:900;color:#fff;
  text-shadow:0 1px 0 rgba(0,0,0,.1);white-space:nowrap;
}

/* ══ MAIN LAYOUT ══ */
#main{
  display:flex;width:100%;
  height:calc(100vh - 52px);
  position:relative;overflow:hidden;
}

/* ══ MAP SIDE ══ */
#map-wrap{
  flex:1;position:relative;overflow:hidden;
  background:radial-gradient(ellipse at 50% 50%,#c8ecff 0%,#a0d8f0 100%);
}
#world-map{width:100%;height:100%;display:block;touch-action:none}
.sphere-bg{fill:url(#oceanGrad)}
.graticule{fill:none;stroke:rgba(255,255,255,.25);stroke-width:.5}
.country{fill:var(--land);stroke:#fff;stroke-width:.5px;transition:fill .15s,opacity .15s;cursor:pointer}
.country.has-data{fill:var(--land-data);cursor:pointer}
.country.has-data:hover{fill:#96e050}
.country.selected{fill:var(--land-sel)!important;stroke:#ff3d8c;stroke-width:1.5px}
.country:not(.has-data){cursor:default}

/* ══ PULSE MARKERS ══ */
.pulse-dot{cursor:pointer;pointer-events:all}
.p-ring{fill:none;stroke:#ff6eb4;stroke-width:1.5;animation:pring 2s ease-out infinite}
.p-dot{fill:#ff6eb4;filter:drop-shadow(0 0 3px #ff6eb4)}
@keyframes pring{0%{r:4;opacity:.8}100%{r:10;opacity:0}}

/* ══ TOOLTIP ══ */
#tip{
  position:fixed;pointer-events:none;z-index:999;
  background:linear-gradient(135deg,#ff6eb4,#c97ff5);
  border-radius:100px;padding:5px 14px;
  font-family:'Fredoka One',cursive;font-size:.85rem;color:#fff;
  opacity:0;transition:opacity .12s;white-space:nowrap;
  box-shadow:0 4px 12px rgba(200,50,150,.35);
}

/* ══ HINT ══ */
#hint{
  position:absolute;bottom:16px;left:50%;transform:translateX(-50%);
  background:rgba(255,255,255,.85);backdrop-filter:blur(8px);
  border:2px solid rgba(255,110,180,.4);border-radius:100px;
  padding:8px 20px;font-size:.78rem;font-weight:900;color:var(--pink);
  pointer-events:none;white-space:nowrap;
  box-shadow:0 4px 16px rgba(255,110,180,.2);
  animation:bounceIn .8s cubic-bezier(.34,1.56,.64,1) .5s both;
}
@keyframes bounceIn{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ══ SIDE PANEL (desktop) ══ */
#panel{
  width:0;min-width:0;background:var(--panel);
  border-left:3px solid rgba(255,110,180,.25);
  display:flex;flex-direction:column;
  transition:width .4s cubic-bezier(.34,1.56,.64,1),min-width .4s cubic-bezier(.34,1.56,.64,1);
  overflow:hidden;z-index:10;position:relative;
}
#panel.open{width:340px;min-width:340px}

/* ══ BOTTOM SHEET (mobile) ══ */
#bottom-sheet{
  display:none;
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:var(--panel);
  border-radius:24px 24px 0 0;
  box-shadow:0 -8px 32px rgba(200,80,180,.2);
  border-top:3px solid rgba(255,110,180,.3);
  transform:translateY(100%);
  transition:transform .45s cubic-bezier(.34,1.56,.64,1);
  max-height:70vh;display:none;flex-direction:column;
}
#bottom-sheet.open{transform:translateY(0)}
.sheet-handle{
  width:40px;height:5px;background:rgba(200,100,200,.3);
  border-radius:3px;margin:10px auto 6px;flex-shrink:0;
}

/* ══ PANEL CONTENT ══ */
.panel-header{
  padding:16px 16px 12px;
  background:linear-gradient(135deg,#ffe8f8 0%,#f0e8ff 100%);
  border-bottom:2px solid rgba(255,110,180,.15);
  flex-shrink:0;position:relative;
}
.country-flag{font-size:2rem;line-height:1}
.country-name{
  font-family:'Fredoka One',cursive;font-size:1.45rem;color:var(--pink);
  letter-spacing:.3px;line-height:1.1;
}
.country-sub{color:var(--muted);font-size:.75rem;font-weight:800;margin-top:2px}
.close-btn{
  position:absolute;top:14px;right:14px;
  width:30px;height:30px;border-radius:50%;
  background:linear-gradient(135deg,#ff6eb4,#c97ff5);
  border:none;color:#fff;font-size:1rem;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;box-shadow:0 3px 8px rgba(200,50,150,.35);
}

/* ══ FRUIT GRID ══ */
.fruit-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:8px;padding:12px;
  border-bottom:2px solid rgba(255,110,180,.12);
  flex-shrink:0;
}
.fruit-card{
  border-radius:16px;padding:10px 6px 8px;
  text-align:center;cursor:pointer;position:relative;
  transition:transform .25s cubic-bezier(.34,1.56,.64,1),box-shadow .25s;
  border:3px solid transparent;
  box-shadow:0 3px 10px rgba(0,0,0,.08);
}
.fruit-card:hover,.fruit-card:active{transform:translateY(-5px) scale(1.08);box-shadow:0 8px 20px rgba(0,0,0,.15)}
.fruit-card.sel{border-color:#ff3d8c;transform:translateY(-5px) scale(1.08);box-shadow:0 8px 20px rgba(255,60,140,.3)}
.fc-emoji{font-size:2rem;display:block;margin-bottom:4px;line-height:1}
.fc-blush-l,.fc-blush-r{
  position:absolute;width:13px;height:9px;
  background:rgba(255,100,150,.3);border-radius:50%;
  bottom:30px;pointer-events:none;
}
.fc-blush-l{left:6px}.fc-blush-r{right:6px}
.fc-name{font-family:'Fredoka One',cursive;font-size:.65rem;color:var(--text);line-height:1.2}
.fc-sparkle{
  position:absolute;top:-4px;right:-4px;font-size:.75rem;
  animation:spin1 3s linear infinite;pointer-events:none;
}
@keyframes spin1{0%,100%{transform:scale(1) rotate(0deg)}50%{transform:scale(1.3) rotate(180deg)}}

/* Stagger bounce on fruit emojis */
.fruit-card:nth-child(1) .fc-emoji{animation:bobble 2.5s ease-in-out 0s infinite}
.fruit-card:nth-child(2) .fc-emoji{animation:bobble 2.5s ease-in-out .3s infinite}
.fruit-card:nth-child(3) .fc-emoji{animation:bobble 2.5s ease-in-out .6s infinite}
.fruit-card:nth-child(4) .fc-emoji{animation:bobble 2.5s ease-in-out .9s infinite}
.fruit-card:nth-child(5) .fc-emoji{animation:bobble 2.5s ease-in-out 1.2s infinite}
.fruit-card:nth-child(6) .fc-emoji{animation:bobble 2.5s ease-in-out 1.5s infinite}
.fruit-card:nth-child(7) .fc-emoji{animation:bobble 2.5s ease-in-out 1.8s infinite}
.fruit-card:nth-child(8) .fc-emoji{animation:bobble 2.5s ease-in-out 2.1s infinite}
@keyframes bobble{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-7px) rotate(3deg)}}

/* ══ DETAIL PANE ══ */
#detail{flex:1;overflow-y:auto;padding:14px;overscroll-behavior:contain}
#detail::-webkit-scrollbar{width:4px}
#detail::-webkit-scrollbar-thumb{background:rgba(200,100,200,.3);border-radius:2px}

.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:30px 20px;gap:10px;color:var(--muted);font-weight:800;text-align:center;font-size:.82rem;
}
.empty-state .big-emoji{font-size:3.5rem;animation:spin2 4s ease-in-out infinite}
@keyframes spin2{0%,100%{transform:rotate(-10deg) scale(1)}50%{transform:rotate(10deg) scale(1.1)}}

/* Fruit detail */
.detail-hero{
  text-align:center;padding:14px 10px 10px;
  background:linear-gradient(135deg,#fff0fa 0%,#f0f8ff 100%);
  border-radius:18px;margin-bottom:12px;position:relative;overflow:hidden;
}
.hero-emoji-wrap{
  position:relative;display:inline-block;
  width:80px;height:80px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 6px;
}
.hero-emoji{font-size:3rem;line-height:1;animation:float1 3s ease-in-out infinite}
.hero-blush{
  position:absolute;width:18px;height:12px;
  background:rgba(255,100,140,.3);border-radius:50%;
  bottom:12px;
}
.hero-blush.l{left:4px}.hero-blush.r{right:4px}
.deco-star{position:absolute;font-size:1.1rem;animation:twinkle 1.8s ease-in-out infinite}
.deco-star:nth-child(1){top:8px;left:12px;animation-delay:0s}
.deco-star:nth-child(2){top:8px;right:12px;animation-delay:.4s}
.deco-star:nth-child(3){bottom:8px;left:20px;animation-delay:.8s}
.deco-star:nth-child(4){bottom:8px;right:20px;animation-delay:1.2s}
@keyframes float1{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes twinkle{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.4);opacity:1}}
.detail-name{font-family:'Fredoka One',cursive;font-size:1.4rem;color:var(--pink)}
.detail-desc{font-size:.77rem;color:var(--muted);font-weight:700;line-height:1.55;margin-top:4px}

.fun-fact{
  background:linear-gradient(135deg,#fff7e0 0%,#fff0f8 100%);
  border-left:4px solid var(--gold);border-radius:0 14px 14px 0;
  padding:10px 12px;font-size:.77rem;color:var(--text);line-height:1.55;
  margin-bottom:12px;font-weight:700;
}
.fun-fact b{color:#e07000;font-family:'Fredoka One',cursive;font-size:.85rem}

.sh3{
  font-family:'Fredoka One',cursive;font-size:.8rem;
  color:var(--purple);text-transform:uppercase;letter-spacing:1px;
  margin-bottom:8px;display:flex;align-items:center;gap:5px;
}

/* Taste bars */
.taste-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.taste-label{font-size:.7rem;font-weight:900;color:var(--muted);width:72px;flex-shrink:0}
.taste-track{flex:1;background:rgba(200,150,220,.15);border-radius:100px;height:10px;overflow:hidden}
.taste-bar{height:100%;border-radius:100px;transition:width .7s cubic-bezier(.34,1.56,.64,1)}
.taste-val{font-size:.7rem;font-weight:900;color:var(--text);width:40px;text-align:right;flex-shrink:0}

/* Tags */
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.tag{
  background:linear-gradient(135deg,#ffe8f8,#f0e8ff);
  border:1.5px solid rgba(200,100,200,.25);border-radius:100px;
  padding:3px 10px;font-size:.68rem;font-weight:900;color:var(--purple);
}

/* Season badge */
.season-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:linear-gradient(135deg,#e8fff0,#e8f8ff);
  border:1.5px solid rgba(80,200,150,.3);border-radius:100px;
  padding:4px 12px;font-size:.72rem;font-weight:900;color:#2a8a60;
  margin-bottom:10px;
}

/* ══ RESPONSIVE ══ */
@media (max-width: 700px){
  #panel{display:none!important}
  #bottom-sheet{display:flex!important}
  #main{display:block}
  #map-wrap{width:100%;height:100%}
  .fruit-grid{grid-template-columns:repeat(4,1fr);gap:6px;padding:8px}
  .fc-name{font-size:.58rem}
  #panel.open{display:none}
}
@media (min-width:701px){
  #bottom-sheet{display:none!important}
}

/* ══ FLOATING DECO ══ */
.float-deco{
  position:fixed;font-size:1.8rem;opacity:.1;pointer-events:none;z-index:0;
  animation:fdrift var(--d,7s) ease-in-out var(--dl,0s) infinite;
}
@keyframes fdrift{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-25px) rotate(5deg)}}
</style>
</head>

// ─── D3 MAP ───────────────────────────────────────────────────────────────────
const mapSvg = d3.select("#world-map");
const mapWrap = document.getElementById("map-wrap");

let projection, geoPath, gCountries, gMarkers;

function buildMap(world){
  mapSvg.selectAll("*").remove();
  const W = mapWrap.clientWidth, H = mapWrap.clientHeight;
  const sc = Math.min(W/6.0, H/3.0);

  projection = d3.geoNaturalEarth1().scale(sc).translate([W/2, H/2]);
  geoPath = d3.geoPath().projection(projection);

  // Defs
  const defs = mapSvg.append("defs");
  const og = defs.append("radialGradient").attr("id","oceanGrad").attr("cx","50%").attr("cy","50%").attr("r","50%");
  og.append("stop").attr("offset","0%").attr("stop-color","#7ad4f0");
  og.append("stop").attr("offset","100%").attr("stop-color","#4aa8d8");

  // Ocean
  mapSvg.append("path").datum({type:"Sphere"})
    .attr("d",geoPath).attr("fill","url(#oceanGrad)");

  // Graticule
  mapSvg.append("path").datum(d3.geoGraticule()())
    .attr("fill","none").attr("stroke","rgba(255,255,255,0.2)").attr("stroke-width",.4)
    .attr("d",geoPath);

  // Countries
  gCountries = mapSvg.append("g");
  const countries = topojson.feature(world, world.objects.countries);
  gCountries.selectAll(".country")
    .data(countries.features)
    .join("path")
    .attr("class",d=>{
      const id=+d.id;
      return "country"+(DATA[id]?" has-data":"");
    })
    .attr("d",geoPath)
    .on("pointerover",pointerOver)
    .on("pointermove",pointerMove)
    .on("pointerout",pointerOut)
    .on("pointerdown",pointerDown);

  // Pulse markers
  gMarkers = mapSvg.append("g");
  for(const [id,[lon,lat]] of Object.entries(CENTROIDS)){
    const [x,y] = projection([lon,lat]);
    if(!x||!y||x<0||y<0||x>W||y>H) continue;
    const g = gMarkers.append("g").attr("transform",`translate(${x},${y})`)
      .attr("class","pulse-dot")
      .on("pointerdown",e=>{e.stopPropagation();if(DATA[+id])openCountry(+id);else openNoData(+id,COUNTRY_NAMES[+id]||"Country")});
    g.append("circle").attr("class","p-ring").attr("r",4)
      .style("animation-delay", (Math.random()*2)+"s");
    g.append("circle").attr("class","p-dot").attr("r",3.5);
  }
}

// ─── INTERACTIONS ─────────────────────────────────────────────────────────────
const tip = document.getElementById("tip");
let currentID = null;

function pointerOver(event,d){
  const id=+d.id;
  if(!DATA[id]) return;
  tip.style.opacity="1";
  tip.textContent=`${DATA[id].flag} ${DATA[id].name}  ✨  ${DATA[id].fruits.length} fruits`;
}
function pointerMove(event){
  tip.style.left=(event.clientX+14)+"px";
  tip.style.top=(event.clientY-32)+"px";
}
function pointerOut(){tip.style.opacity="0"}
function pointerDown(event,d){
  const id = +d.id;
  const cname = COUNTRY_NAMES[id] || (d.id ? "Country #"+d.id : null);
  if(!cname) return; // ocean or unknown shape
  if(DATA[id]){
    openCountry(id);
  } else {
    fetchFruitsForCountry(id, cname);
  }
}

{

  "fruits": [
    {

      "season": "Month range (e.g. Jun–Aug or Year-round)",
      "desc": "2-3 sentence description of the fruit for curious preteens. Fun and engaging!",
      "fun": "Start with an emoji then ONE amazing, surprising, or funny fact about this fruit and its connection to ${cname}. Be specific with numbers/stories!",
      "tags": ["tag1","tag2","tag3","tag4"]
    }
  ]
}

Rules:
- All 5 fruits must be real and accurate
- Facts must be genuinely true and interesting
- Descriptions should be engaging for 10-13 year olds
- Use varied bg pastel colours: pinks, yellows, greens, blues, purples
- The emoji should clearly represent the fruit`;

    const resp = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:1200,
        messages:[{role:"user",content:prompt}]
      })
    });

    if(!resp.ok) throw new Error("API error "+resp.status);
    const json = await resp.json();
    const text = json.content.find(b=>b.type==="text")?.text||"";

    // Parse JSON — strip any accidental markdown fences
    const clean = text.replace(/```json|```/g,"").trim();
    const parsed = JSON.parse(clean);

    // Store in DATA and mark on map
    DATA[id] = { name: cname, flag: parsed.flag||"🌍", fruits: parsed.fruits };
    AI_CACHE[id] = true;

    // Colour country as "has data" now
    gCountries.selectAll(".country").filter(d=>+d.id===id)
      .classed("has-data",true);

    openCountry(id);

  } catch(err) {
    const errHTML = `<div class="empty-state" style="padding:24px">
      <div style="font-size:3rem">😅</div>
      <div style="font-family:'Fredoka One',cursive;font-size:1rem;color:var(--pink);margin-top:10px">Oops!</div>
      <div style="font-size:.78rem;color:var(--muted);margin-top:6px;line-height:1.6">
        Couldn't load fruit data right now.<br>Check your internet and try again!<br>
        <span style="font-size:.7rem;opacity:.6">${err.message}</span>
      </div>
    </div>`;
    if(isMobile) document.getElementById("detail-mobile").innerHTML=errHTML;
    else document.getElementById("detail").innerHTML=errHTML;
  }
}

function openCountry(id){
  const data=DATA[id];
  if(!data) return;
  currentID=id;

  // Highlight
  gCountries.selectAll(".country").classed("selected",false);
  gCountries.selectAll(".country").filter(d=>+d.id===id).classed("selected",true);

  const isMobile = window.innerWidth <= 700;
  if(isMobile) openMobileSheet(data);
  else openDesktopPanel(data);

  document.getElementById("hint").style.opacity="0";
}

function populateFruitGrid(containerId, detailId, data){
  const grid = document.getElementById(containerId);
  grid.innerHTML="";
  data.fruits.forEach((f,i)=>{
    const card = document.createElement("div");
    card.className="fruit-card";
    card.style.background=PALETTES[i%PALETTES.length];
    card.innerHTML=`
      <span class="fc-emoji">${f.emoji}</span>
      <div class="fc-blush-l"></div>
      <div class="fc-blush-r"></div>
      <span class="fc-name">${f.name}</span>
      <span class="fc-sparkle">✨</span>
    `;
    card.addEventListener("pointerdown",()=>{
      grid.querySelectorAll(".fruit-card").forEach(c=>c.classList.remove("sel"));
      card.classList.add("sel");
      renderDetail(detailId, f);
    });
    grid.appendChild(card);
  });
}

function openDesktopPanel(data){
  document.getElementById("panel-flag").textContent=data.flag;
  document.getElementById("panel-name").textContent=data.name;
  document.getElementById("panel-sub").textContent=`${data.fruits.length} amazing fruits to explore!`;
  populateFruitGrid("fruit-grid-desktop","detail",data);
  document.getElementById("panel").classList.add("open");
  document.getElementById("detail").innerHTML=`<div class="empty-state"><div class="big-emoji">${data.fruits[0]?.emoji||"🍉"}</div><div>Pick a fruit above<br>to see its secrets! ✨</div></div>`;
  setTimeout(()=>{
    const first=document.getElementById("fruit-grid-desktop").querySelector(".fruit-card");
    if(first) first.dispatchEvent(new Event("pointerdown"));
  },150);
}

function openMobileSheet(data){
  document.getElementById("sheet-flag").textContent=data.flag;
  document.getElementById("sheet-name").textContent=data.name;
  document.getElementById("sheet-sub").textContent=`${data.fruits.length} amazing fruits!`;
  populateFruitGrid("fruit-grid-mobile","detail-mobile",data);
  document.getElementById("bottom-sheet").classList.add("open");
  document.getElementById("detail-mobile").innerHTML=`<div class="empty-state"><div class="big-emoji">${data.fruits[0]?.emoji||"🍉"}</div><div>Pick a fruit above<br>to see its secrets! ✨</div></div>`;
  setTimeout(()=>{
    const first=document.getElementById("fruit-grid-mobile").querySelector(".fruit-card");
    if(first) first.dispatchEvent(new Event("pointerdown"));
  },150);
}

function renderDetail(containerId, f){
  const d=document.getElementById(containerId);
  const maxVitC=5300;
  const vitCPct=Math.min(100,(f.vitC/maxVitC)*100+5);
  const calPct=Math.min(100,((f.cal||70)/250)*100);

  d.innerHTML=`
    <div class="detail-hero">
      <span class="deco-star">⭐</span>
      <span class="deco-star">🌟</span>
      <span class="deco-star">✨</span>
      <span class="deco-star">💫</span>
      <div class="hero-emoji-wrap">
        <span class="hero-emoji">${f.emoji}</span>
        <div class="hero-blush l"></div>
        <div class="hero-blush r"></div>
      </div>
      <div class="detail-name">${f.name}</div>
      <p class="detail-desc">${f.desc}</p>
    </div>

    <div class="fun-fact"><b>🤩 Fun Fact!</b><br>${f.fun}</div>

    <div class="season-badge">🗓️ Season: ${f.season}</div>

    <div class="sh3">✨ Taste Profile</div>
    ${tRow("🍬 Sweetness",f.sweet,barC(f.sweet,"#ffb347","#ff6eb4","#f4e040"),f.sweet+"%")}
    ${tRow("🍋 Sourness",f.acid,barC(f.acid,"#78e060","#f4e040","#f08040"),f.acid+"%")}
    ${tRow("🫗 Bitterness",f.bitter,"#c8a0e0",f.bitter+"%")}

    <div class="sh3" style="margin-top:12px">💊 Nutrition (per 100g)</div>
    ${tRow("Vitamin C",vitCPct,"#5de8b0",f.vitC+"mg")}
    ${tRow("Calories",calPct,"#ffcc44",(f.cal||"?")+"kcal")}
    ${tRow("Water",(f.water||75),"#5bc8f0",(f.water||"?")+"% 💧")}

    <div class="tags">${(f.tags||[]).map(t=>`<span class="tag">${t}</span>`).join("")}</div>
  `;

  // Animate bars
  setTimeout(()=>{
    d.querySelectorAll(".taste-bar").forEach(b=>{
      b.style.width=b.dataset.w+"%";
    });
  },60);
}

function tRow(lbl,pct,col,val){
  return `<div class="taste-row">
    <span class="taste-label">${lbl}</span>
    <div class="taste-track"><div class="taste-bar" data-w="${pct}" style="width:0%;background:${col}"></div></div>
    <span class="taste-val">${val}</span>
  </div>`;
}
function barC(v,lo,mid,hi){ return v<40?lo:v<70?mid:hi; }

// ─── CLOSE BUTTONS ────────────────────────────────────────────────────────────
document.getElementById("close-desktop").addEventListener("pointerdown",()=>{
  document.getElementById("panel").classList.remove("open");
  gCountries.selectAll(".country").classed("selected",false);
  currentID=null;
  setTimeout(()=>document.getElementById("hint").style.opacity="1",400);
});
document.getElementById("close-mobile").addEventListener("pointerdown",()=>{
  document.getElementById("bottom-sheet").classList.remove("open");
  gCountries.selectAll(".country").classed("selected",false);
  currentID=null;
  setTimeout(()=>document.getElementById("hint").style.opacity="1",400);
});

// ─── RESIZE ───────────────────────────────────────────────────────────────────
let resizeTimer;
window.addEventListener("resize",()=>{
  clearTimeout(resizeTimer);
  resizeTimer=setTimeout(()=>{
    if(window._worldData) buildMap(window._worldData);
  },200);
});

// ─── LOAD MAP ─────────────────────────────────────────────────────────────────
fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json")
  .then(r=>r.json())
  .then(world=>{
    window._worldData=world;
    buildMap(world);
  })
  .catch(err=>{
    mapWrap.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100%;font-family:'Fredoka One',cursive;font-size:1.1rem;color:#c060a0;text-align:center;padding:30px">
      🌍 Oops! Can't load the map.<br><br>
      <span style="font-size:.8rem;font-family:'Nunito',sans-serif;color:#9080b0">Check your internet and reload! 💕<br>${err}</span>
    </div>`;
  });
</script>
